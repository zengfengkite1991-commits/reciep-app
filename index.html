<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菜品研发记录</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:15px;color:#333}
        .card{background:#fff;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
        h1{color:#667eea;font-size:22px}
        h3{margin-bottom:10px;color:#333}
        .btn{background:#667eea;color:#fff;border:none;padding:12px 24px;border-radius:25px;font-size:16px;cursor:pointer;margin:5px 0;width:100%}
        .btn:active{transform:scale(0.95)}
        .btn-small{width:auto;padding:6px 12px;font-size:12px}
        .btn-secondary{background:#f0f0f0;color:#333}
        .btn-danger{background:#ff6b6b}
        .btn-success{background:#52c41a}
        .btn-warning{background:#faad14}
        .input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:16px;margin-bottom:0}
        .input:focus{outline:none;border-color:#667eea}
        select.input{background:#fff}
        .recipe{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#f8f8f8;border-radius:10px;margin-bottom:10px;cursor:pointer}
        .hidden{display:none !important}
        .tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:15px;padding-bottom:5px}
        .tab{background:#fff;border:2px solid #e0e0e0;padding:8px 16px;border-radius:20px;white-space:nowrap;cursor:pointer;font-size:14px}
        .tab.active{background:#667eea;color:#fff;border-color:#667eea}
        textarea{width:100%;min-height:80px;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px;margin-top:10px}
        .step{background:#f8f8f8;border-radius:12px;padding:15px;margin-bottom:10px}
        .step-num{display:inline-block;background:#667eea;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-weight:bold;margin-right:10px}
        .ing-row,.seasoning-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:10px;align-items:center}
        .flex{display:flex;gap:10px}
        .flex .btn{flex:1}
        .step-img{width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin:10px 0;display:none}
        .step-img.has-image{display:block}
        .file-input{display:none}
        .upload-btn{background:#f0f0f0;color:#667eea;border:2px dashed #ccc;padding:20px;border-radius:10px;text-align:center;cursor:pointer;margin:10px 0}
        .upload-btn:active{background:#e0e0e0}
        .detail-img{width:100%;max-height:300px;object-fit:cover;border-radius:10px;margin-bottom:10px}
        .section-title{color:#667eea;font-size:16px;font-weight:bold;margin:15px 0 10px;padding-bottom:5px;border-bottom:2px solid #f0f0f0}
        .section-title:first-child{margin-top:0}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;padding:20px}
        .modal.active{display:flex}
        .modal-content{background:#fff;border-radius:20px;padding:30px;width:100%;max-width:400px;text-align:center}
        .modal-title{font-size:20px;margin-bottom:20px;color:#333}
        .share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-bottom:20px}
        .share-item{padding:20px;border:2px solid #e0e0e0;border-radius:12px;cursor:pointer;transition:all 0.3s}
        .share-item:hover{border-color:#667eea;background:#f8f8ff}
        .share-icon{font-size:32px;margin-bottom:8px}
        .share-text{font-size:14px;color:#666}
        .close-btn{width:100%;padding:12px;background:#f0f0f0;border:none;border-radius:10px;font-size:16px;cursor:pointer}
        .share-preview{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px;max-height:300px;overflow-y:auto}
        .loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:20px 40px;border-radius:10px;display:none;z-index:2000}
        /* 创建人信息样式 */
        .creator-info{background:#f8f8f8;padding:10px 15px;border-radius:8px;margin-bottom:15px;font-size:14px;color:#666}
        .creator-info strong{color:#667eea}
    </style>
</head>
<body>
    <div id="page-main">
        <div class="card">
            <h1>🍳 菜品研发记录</h1>
            <p style="color:#666;font-size:14px">记录每一道美味的诞生过程</p>
            <div class="creator-info">
                👨‍🍳 当前用户：<strong>Chef KtZ</strong>
            </div>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="filter('all')">全部</button>
            <button class="tab" onclick="filter('饭类')">饭类</button>
            <button class="tab" onclick="filter('粉类')">粉类</button>
            <button class="tab" onclick="filter('小食')">小食</button>
            <button class="tab" onclick="filter('主菜')">主菜</button>
        </div>
        <button class="btn" onclick="showEdit()">+ 创建新菜谱</button>
        <div id="list" style="margin-top:15px"></div>
    </div>

    <div id="page-edit" class="hidden">
        <div class="card">
            <button class="btn btn-secondary" onclick="showMain()">← 返回</button>
            <h2 id="edit-title" style="margin-top:15px;color:#667eea">创建新菜谱</h2>
        </div>
        <div class="card">
            <input type="text" class="input" id="name" placeholder="菜谱名称" style="margin-bottom:10px">
            <select class="input" id="category">
                <option value="">选择分类</option>
                <option value="饭类">饭类</option>
                <option value="粉类">粉类</option>
                <option value="小食">小食</option>
                <option value="主菜">主菜</option>
                <option value="冷食">冷食</option>
            </select>
        </div>
        
        <div class="card">
            <div class="section-title">🧂 调料</div>
            <div id="seasonings"></div>
            <button class="btn btn-secondary" onclick="addSeasoning()">+ 添加调料</button>
            
            <div class="section-title">🥘 食材</div>
            <div id="ings"></div>
            <button class="btn btn-secondary" onclick="addIng()">+ 添加食材</button>
        </div>
        
        <div class="card">
            <h3>📝 步骤（可配图）</h3>
            <div id="steps"></div>
            <button class="btn btn-secondary" onclick="addStep()">+ 添加步骤</button>
        </div>
        <div class="flex">
            <button class="btn" onclick="save()">保存</button>
            <button class="btn btn-secondary" onclick="showMain()">取消</button>
        </div>
    </div>

    <div id="page-detail" class="hidden">
        <div class="card">
            <button class="btn btn-secondary" onclick="showMain()">← 返回</button>
            <h2 id="detail-name" style="margin-top:15px;color:#667eea"></h2>
        </div>
        <div id="detail-content"></div>
        <div class="flex">
            <button class="btn" onclick="doEdit()">编辑</button>
            <button class="btn btn-success" onclick="showShare()">分享</button>
            <button class="btn btn-danger" onclick="doDelete()">删除</button>
        </div>
    </div>

    <div id="shareModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title">分享菜谱</h3>
            <div class="share-grid">
                <div class="share-item" onclick="shareLink()">
                    <div class="share-icon">🔗</div>
                    <div class="share-text">复制链接</div>
                </div>
                <div class="share-item" onclick="saveImage()">
                    <div class="share-icon">🖼️</div>
                    <div class="share-text">保存图片</div>
                </div>
                <div class="share-item" onclick="savePDF()">
                    <div class="share-icon">📄</div>
                    <div class="share-text">保存PDF</div>
                </div>
            </div>
            <div id="sharePreview" class="share-preview hidden"></div>
            <button class="close-btn" onclick="closeShare()">取消</button>
        </div>
    </div>

    <div id="loading" class="loading">生成中...</div>

    <script>
        if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');
        let recipes=JSON.parse(localStorage.getItem('recipes'))||[];
        let current='all',editingId=null,viewingId=null;
        
        // 创建人信息
        const CREATOR_NAME = 'Chef KtZ';

        const unitOptions=`
            <option value="">单位</option>
            <option value="支">支</option>
            <option value="包">包</option>
            <option value="克">克</option>
            <option value="毫升">毫升</option>
            <option value="个">个</option>
            <option value="只">只</option>
            <option value="瓶">瓶</option>
            <option value="升">升</option>
            <option value="勺">勺</option>
            <option value="茶匙">茶匙</option>
            <option value="汤匙">汤匙</option>
            <option value="斤">斤</option>
            <option value="两">两</option>
            <option value="把">把</option>
            <option value="块">块</option>
            <option value="片">片</option>
            <option value="根">根</option>
            <option value="条">条</option>
            <option value="适量">适量</option>
            <option value="少许">少许</option>
        `;

        function showMain(){
            document.getElementById('page-main').classList.remove('hidden');
            document.getElementById('page-edit').classList.add('hidden');
            document.getElementById('page-detail').classList.add('hidden');
            closeShare();
            render();
        }
        
        function showEdit(){
            editingId=null;
            document.getElementById('edit-title').textContent='创建新菜谱';
            document.getElementById('name').value='';
            document.getElementById('category').value='';
            document.getElementById('seasonings').innerHTML=seasoningRow();
            document.getElementById('ings').innerHTML=ingRow();
            document.getElementById('steps').innerHTML=createStepHtml(1);
            document.getElementById('page-main').classList.add('hidden');
            document.getElementById('page-edit').classList.remove('hidden');
        }

        function seasoningRow(name='',amount='',unit=''){
            return `
                <div class="seasoning-row">
                    <input type="text" class="input" placeholder="调料名称" value="${name}">
                    <input type="text" class="input" placeholder="份量" value="${amount}">
                    <select class="input">${unitOptions.replace(`value="${unit}"`,`value="${unit}" selected`)}</select>
                    <button class="btn btn-danger btn-small" onclick="this.parentElement.remove()">×</button>
                </div>
            `;
        }

        function ingRow(name='',amount='',unit=''){
            return `
                <div class="ing-row">
                    <input type="text" class="input" placeholder="食材名称" value="${name}">
                    <input type="text" class="input" placeholder="份量" value="${amount}">
                    <select class="input">${unitOptions.replace(`value="${unit}"`,`value="${unit}" selected`)}</select>
                    <button class="btn btn-danger btn-small" onclick="this.parentElement.remove()">×</button>
                </div>
            `;
        }

        function createStepHtml(n, imgData='', text=''){
            return `
                <div class="step" data-step="${n}">
                    <span class="step-num">${n}</span>
                    <div class="upload-btn" onclick="this.nextElementSibling.click()">
                        📷 点击选择图片（可选）
                    </div>
                    <input type="file" class="file-input" accept="image/*" onchange="handleImage(this)">
                    <img class="step-img ${imgData?'has-image':''}" src="${imgData}" ${imgData?'':'style="display:none"'} onclick="this.previousElementSibling.previousElementSibling.click()">
                    <textarea placeholder="描述步骤...">${text}</textarea>
                    <button class="btn btn-danger btn-small" onclick="this.parentElement.remove();renum()">删除</button>
                </div>
            `;
        }

        function handleImage(input){
            const file=input.files[0];
            if(!file)return;
            
            const reader=new FileReader();
            reader.onload=function(e){
                const img=input.nextElementSibling;
                img.src=e.target.result;
                img.classList.add('has-image');
                img.style.display='block';
            };
            reader.readAsDataURL(file);
        }

        function addSeasoning(){
            document.getElementById('seasonings').insertAdjacentHTML('beforeend',seasoningRow());
        }

        function addIng(){
            document.getElementById('ings').insertAdjacentHTML('beforeend',ingRow());
        }
        
        function addStep(){
            const n=document.querySelectorAll('.step').length+1;
            document.getElementById('steps').insertAdjacentHTML('beforeend',createStepHtml(n));
        }
        
        function renum(){
            document.querySelectorAll('.step').forEach((step,i)=>{
                step.querySelector('.step-num').textContent=i+1;
            });
        }
        
        function filter(cat){
            current=cat;
            document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }
        
        function render(){
            const list=document.getElementById('list');
            const data=current==='all'?recipes:recipes.filter(r=>r.category===current);
            if(data.length===0){
                list.innerHTML='<div class="card" style="text-align:center;color:#999;padding:40px">暂无菜谱，点击上方按钮创建</div>';
                return;
            }
            list.innerHTML=data.map(r=>{
                const totalItems=(r.seasonings?r.seasonings.length:0)+(r.ings?r.ings.length:0);
                return `<div class="recipe" onclick="showDetail('${r.id}')"><div><div style="font-weight:bold;font-size:18px;color:#333">${r.name}</div><div style="color:#999;font-size:14px;margin-top:5px">${r.category} · ${totalItems}种材料 · ${r.steps.length}个步骤</div></div><span style="font-size:20px;color:#667eea">→</span></div>`;
            }).join('');
        }
        
        function save(){
            const name=document.getElementById('name').value.trim();
            const cat=document.getElementById('category').value;
            if(!name||!cat){alert('请填写名称和分类');return;}
            
            const seasonings=[];
            document.querySelectorAll('#seasonings .seasoning-row').forEach(row=>{
                const inputs=row.querySelectorAll('input,select');
                if(inputs[0].value)seasonings.push({
                    name:inputs[0].value,
                    amount:inputs[1].value||'0',
                    unit:inputs[2].value||'适量'
                });
            });
            
            const ings=[];
            document.querySelectorAll('#ings .ing-row').forEach(row=>{
                const inputs=row.querySelectorAll('input,select');
                if(inputs[0].value)ings.push({
                    name:inputs[0].value,
                    amount:inputs[1].value||'0',
                    unit:inputs[2].value||'适量'
                });
            });
            
            const steps=[];
            document.querySelectorAll('#steps .step').forEach(step=>{
                const text=step.querySelector('textarea').value;
                const img=step.querySelector('.step-img').src;
                if(text||img.includes('data:image')){
                    steps.push({
                        text:text,
                        image:img.includes('data:image')?img:''
                    });
                }
            });
            
            const recipe={
                id:editingId||Date.now().toString(),
                name,
                category:cat,
                seasonings,
                ings,
                steps,
                date:new Date().toLocaleDateString(),
                creator:CREATOR_NAME  // 保存创建人
            };
            
            if(editingId){
                const i=recipes.findIndex(r=>r.id===editingId);
                recipes[i]=recipe;
            }else{
                recipes.push(recipe);
            }
            
            localStorage.setItem('recipes',JSON.stringify(recipes));
            showMain();
        }
        
        function showDetail(id){
            viewingId=id;
            const r=recipes.find(x=>x.id===id);
            document.getElementById('detail-name').textContent=r.name;
            
            // 显示创建人
            const creatorHtml=r.creator?`<div style="color:#667eea;font-size:14px;margin-top:5px;">👨‍🍳 创建人：${r.creator}</div>`:'';
            
            let seasoningsHtml='';
            if(r.seasonings&&r.seasonings.length>0){
                seasoningsHtml=`<div class="card"><h3 style="margin-bottom:15px">🧂 调料</h3>${r.seasonings.map(s=>`<div style="display:flex;justify-content:space-between;padding:10px;background:#f8f8f8;border-radius:8px;margin-bottom:8px"><span>${s.name}</span><span style="color:#667eea;font-weight:bold">${s.amount}${s.unit}</span></div>`).join('')}</div>`;
            }
            
            let ingsHtml='';
            if(r.ings&&r.ings.length>0){
                ingsHtml=`<div class="card"><h3 style="margin-bottom:15px">🥘 食材</h3>${r.ings.map(i=>`<div style="display:flex;justify-content:space-between;padding:10px;background:#f8f8f8;border-radius:8px;margin-bottom:8px"><span>${i.name}</span><span style="color:#667eea;font-weight:bold">${i.amount}${i.unit}</span></div>`).join('')}</div>`;
            }
            
            let stepsHtml='';
            if(r.steps&&r.steps.length>0){
                stepsHtml=`<div class="card"><h3 style="margin-bottom:15px">📝 步骤</h3>${r.steps.map((s,i)=>`<div class="step"><span class="step-num">${i+1}</span>${s.image?`<img class="detail-img" src="${s.image}">`:''}<p style="line-height:1.6">${s.text||'（无文字说明）'}</p></div>`).join('')}</div>`;
            }
            
            document.getElementById('detail-content').innerHTML=`
                <div class="card">
                    <span style="background:#667eea;color:#fff;padding:5px 15px;border-radius:15px;font-size:14px">${r.category}</span>
                    <span style="color:#999;font-size:14px;margin-left:10px">${r.date}</span>
                    ${creatorHtml}
                </div>
                ${seasoningsHtml}
                ${ingsHtml}
                ${stepsHtml||'<div class="card"><p style="color:#999">暂无步骤</p></div>'}
            `;
            document.getElementById('page-main').classList.add('hidden');
            document.getElementById('page-detail').classList.remove('hidden');
        }
        
        function doEdit(){
            const r=recipes.find(x=>x.id===viewingId);
            editingId=r.id;
            document.getElementById('edit-title').textContent='编辑菜谱';
            document.getElementById('name').value=r.name;
            document.getElementById('category').value=r.category;
            
            document.getElementById('seasonings').innerHTML='';
            if(r.seasonings&&r.seasonings.length>0){
                r.seasonings.forEach(s=>{
                    document.getElementById('seasonings').insertAdjacentHTML('beforeend',seasoningRow(s.name,s.amount,s.unit));
                });
            }else{
                document.getElementById('seasonings').innerHTML=seasoningRow();
            }
            
            document.getElementById('ings').innerHTML='';
            if(r.ings&&r.ings.length>0){
                r.ings.forEach(i=>{
                    document.getElementById('ings').insertAdjacentHTML('beforeend',ingRow(i.name,i.amount,i.unit));
                });
            }else{
                document.getElementById('ings').innerHTML=ingRow();
            }
            
            document.getElementById('steps').innerHTML='';
            if(r.steps&&r.steps.length>0){
                r.steps.forEach((s,i)=>{
                    document.getElementById('steps').insertAdjacentHTML('beforeend',createStepHtml(i+1,s.image||'',s.text||''));
                });
            }else{
                document.getElementById('steps').innerHTML=createStepHtml(1);
            }
            
            document.getElementById('page-detail').classList.add('hidden');
            document.getElementById('page-edit').classList.remove('hidden');
        }
        
        function doDelete(){
            if(!confirm('确定删除？'))return;
            recipes=recipes.filter(r=>r.id!==viewingId);
            localStorage.setItem('recipes',JSON.stringify(recipes));
            showMain();
        }

        // ========== 分享功能 ==========
        
        function showShare(){
            document.getElementById('shareModal').classList.add('active');
        }
        
        function closeShare(){
            document.getElementById('shareModal').classList.remove('active');
            document.getElementById('sharePreview').classList.add('hidden');
        }
        
        function shareLink(){
            const r=recipes.find(x=>x.id===viewingId);
            const url=window.location.href+'?recipe='+r.id;
            
            if(navigator.clipboard){
                navigator.clipboard.writeText(url).then(()=>{
                    alert('链接已复制到剪贴板！');
                    closeShare();
                });
            }else{
                alert('请手动复制：'+url);
            }
        }
        
        // 获取当前时间字符串
        function getCurrentTime(){
            const now=new Date();
            const year=now.getFullYear();
            const month=String(now.getMonth()+1).padStart(2,'0');
            const day=String(now.getDate()).padStart(2,'0');
            const hour=String(now.getHours()).padStart(2,'0');
            const minute=String(now.getMinutes()).padStart(2,'0');
            return `${year}-${month}-${day} ${hour}:${minute}`;
        }
        
        // 保存图片 - 高清版
        async function saveImage(){
            showLoading(true);
            try{
                const r=recipes.find(x=>x.id===viewingId);
                const content=createShareContent(r);
                
                const canvas=await html2canvas(content,{
                    scale:4,
                    backgroundColor:'#ffffff',
                    useCORS:true
                });
                
                const link=document.createElement('a');
                link.download=`${r.name}_菜谱.png`;
                link.href=canvas.toDataURL('image/png', 1.0);
                link.click();
                
                // 清理临时元素
                content.remove();
                closeShare();
            }catch(err){
                alert('生成图片失败：'+err.message);
            }
            showLoading(false);
        }
        
        // 保存PDF - 高清版
        async function savePDF(){
            showLoading(true);
            try{
                const r=recipes.find(x=>x.id===viewingId);
                const content=createShareContent(r);
                
                const canvas=await html2canvas(content,{
                    scale:4,
                    backgroundColor:'#ffffff',
                    useCORS:true
                });
                
                const imgData=canvas.toDataURL('image/png', 1.0);
                const {jsPDF}=window.jspdf;
                
                const pdf=new jsPDF({
                    orientation:'p',
                    unit:'mm',
                    format:'a4',
                    compress:false
                });
                
                const imgWidth=210;
                const pageHeight=295;
                const imgHeight=canvas.height*imgWidth/canvas.width;
                let heightLeft=imgHeight;
                let position=0;
                
                pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
                heightLeft-=pageHeight;
                
                while(heightLeft>=0){
                    position=heightLeft-imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData,'PNG',0,position,imgWidth,imgHeight);
                    heightLeft-=pageHeight;
                }
                
                pdf.save(`${r.name}_菜谱.pdf`);
                
                // 清理临时元素
                content.remove();
                closeShare();
            }catch(err){
                alert('生成PDF失败：'+err.message);
            }
            showLoading(false);
        }
        
        // 创建分享内容（带创建人和导出时间）
        function createShareContent(r){
            const div=document.createElement('div');
            div.style.cssText='width:375px;padding:20px;background:#fff;font-family:sans-serif;';
            
            const exportTime=getCurrentTime();
            const creator=r.creator||CREATOR_NAME;
            
            let seasoningsHtml='';
            if(r.seasonings&&r.seasonings.length>0){
                seasoningsHtml=`<h3 style="color:#667eea;margin:15px 0 10px;">🧂 调料</h3>`+r.seasonings.map(s=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${s.name}</span><span style="color:#667eea;font-weight:bold">${s.amount}${s.unit}</span></div>`).join('');
            }
            
            let ingsHtml='';
            if(r.ings&&r.ings.length>0){
                ingsHtml=`<h3 style="color:#667eea;margin:15px 0 10px;">🥘 食材</h3>`+r.ings.map(i=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;"><span>${i.name}</span><span style="color:#667eea;font-weight:bold">${i.amount}${i.unit}</span></div>`).join('');
            }
            
            let stepsHtml='';
            if(r.steps&&r.steps.length>0){
                stepsHtml=`<h3 style="color:#667eea;margin:15px 0 10px;">📝 步骤</h3>`+r.steps.map((s,i)=>`<div style="margin-bottom:15px;"><div style="background:#667eea;color:#fff;width:24px;height:24px;border-radius:50%;text-align:center;line-height:24px;font-weight:bold;display:inline-block;margin-right:8px;">${i+1}</div><div style="margin-top:8px;">${s.image?`<img src="${s.image}" style="max-width:100%;border-radius:8px;margin-bottom:8px;">`:''}<p style="line-height:1.6;margin:0;">${s.text||''}</p></div></div>`).join('');
            }
            
            div.innerHTML=`
                <div style="text-align:center;border-bottom:3px solid #667eea;padding-bottom:15px;margin-bottom:20px;">
                    <h1 style="color:#667eea;margin:0;font-size:24px;">🍳 ${r.name}</h1>
                    <p style="color:#999;margin:5px 0 0;font-size:14px;">${r.category} · ${r.date}</p>
                </div>
                ${seasoningsHtml}
                ${ingsHtml}
                ${stepsHtml}
                <div style="margin-top:30px;padding-top:15px;border-top:2px solid #667eea;background:#f8f8f8;padding:15px;border-radius:8px;">
                    <div style="color:#667eea;font-size:14px;font-weight:bold;margin-bottom:5px;">👨‍🍳 创建人：${creator}</div>
                    <div style="color:#999;font-size:12px;">📅 导出时间：${exportTime}</div>
                </div>
            `;
            
            document.body.appendChild(div);
            return div;
        }
        
        function showLoading(show){
            document.getElementById('loading').style.display=show?'block':'none';
        }

        window.onload=function(){
            const urlParams=new URLSearchParams(window.location.search);
            const recipeId=urlParams.get('recipe');
            if(recipeId){
                const recipe=recipes.find(r=>r.id===recipeId);
                if(recipe){
                    showDetail(recipeId);
                }
            }
        };
        
        render();
    </script>
</body>
</html>
